# Crossplane profile — fills the {{TOKENS}} in shared command skeletons under
# templates/iac/_shared/commands/.

ENGINEER: "Crossplane Engineer"
ENGINEER_PERSONA: "crossplane_engineer"
OUTPUT: "working Crossplane YAML"
RESOURCE_TERM: "composition"
ARG_HINT_DIR: "resource-directory"
CREATE_CMD: "new_composition"
UPDATE_CMD: "update_composition"
NEW_FILES: "`definition.yaml` (XRD), `composition.yaml` (Pipeline), example claims under `examples/`, and `README.md`"
EXISTING_FILES: "`definition.yaml` / `composition.yaml`"
SCHEMA_SOURCE: "doc.crds.dev"
SCHEMA_QUERY: "WebSearch site:doc.crds.dev <group> <Kind> <version>"
SCHEMA_CONFIRM: "the exact `apiVersion`/`kind`, the `spec.forProvider` fields, the `status.atProvider` fields (for `ToCompositeFieldPath`), and the connection-secret keys the provider publishes"
BREAKING_NOTE: "If the change requires an XRD schema break or a managed-resource recreation, **stop and warn** before writing — that is breaking-change territory and belongs in `/infrakit:update_composition`."
VALIDATE_SUMMARY: "YAML parse <passed/skipped>, crossplane render <passed/skipped>"
ERR_SCHEMA: "apiVersion / field unknown | Look it up on doc.crds.dev; never guess"
ERR_BREAKING: "Change requires XRD schema break or resource recreation | Stop, warn, recommend `/infrakit:update_composition`"
ERR_SECRET: "Hardcoded credential required by requirement | Refuse — use autoGeneratePassword + passwordSecretRef"

IMPLEMENT_RULES: |
  - **Pipeline mode only** — never Resources mode.
  - XRD `connectionSecretKeys` match the Composition's `connectionDetails`.
  - Every managed resource carries the three Crossplane-mandatory tag patches (`crossplane.io/claim-name`, `crossplane.io/claim-namespace`, `managed-by`) plus the project's required tags, sourced from labels/parameters — never hardcoded.
  - Every managed resource sets `providerConfigRef`.
  - No hardcoded credentials — use `autoGeneratePassword` + `passwordSecretRef`.
  - `publiclyAccessible` / public-network flags default to false/disabled; encryption at rest enabled for storage resources.

VALIDATE_BLOCK: |
  ```bash
  python3 -c "import yaml,sys; [list(yaml.safe_load_all(open(f))) for f in sys.argv[1:]]" \
    <dir>/definition.yaml <dir>/composition.yaml <dir>/examples/*.yaml
  ```

  If `crossplane render` is available locally with `function-patch-and-transform` cached, also run it against the example claim.
