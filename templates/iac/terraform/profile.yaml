# Terraform profile — fills the {{TOKENS}} in shared command skeletons under
# templates/iac/_shared/commands/. This is the per-tool "data block": adding a
# new IaC tool means writing one of these, not forking every shared command.

ENGINEER: "Terraform Engineer"
ENGINEER_PERSONA: "terraform_engineer"
OUTPUT: "working HCL"
RESOURCE_TERM: "module"
ARG_HINT_DIR: "module-directory"
CREATE_CMD: "create_terraform_code"
UPDATE_CMD: "update_terraform_code"
NEW_FILES: "`versions.tf`, `variables.tf`, `main.tf`, `outputs.tf`, `README.md`"
EXISTING_FILES: "`*.tf` files"
SCHEMA_SOURCE: "the Terraform Registry"
SCHEMA_QUERY: "WebSearch site:registry.terraform.io/providers/hashicorp/<provider>/latest/docs/resources/<type>"
SCHEMA_CONFIRM: "the required/optional arguments, their types, and the computed attributes available for outputs"
BREAKING_NOTE: "If the change forces a destroy/recreate of a stateful resource or needs `moved` blocks, **stop and warn** before writing — that is breaking-change territory and belongs in `/infrakit:update_terraform_code`."
VALIDATE_SUMMARY: "fmt <passed/skipped>, validate <passed/skipped>"
ERR_SCHEMA: "Resource argument unknown | Look it up on registry.terraform.io; never guess"
ERR_BREAKING: "Change forces destroy/recreate of a stateful resource | Stop, warn, recommend `/infrakit:update_terraform_code`"
ERR_SECRET: "Hardcoded secret required by requirement | Refuse — use a `sensitive` variable / secrets data source"

IMPLEMENT_RULES: |
  - `versions.tf` with `required_version` (upper-bounded) and pessimistically pinned providers (`~>`).
  - Every variable typed, described, and validated where constrained; secrets marked `sensitive = true` with no plaintext default.
  - Required tags from `.infrakit/tagging-standard.md` on every taggable resource via `merge(local.required_tags, var.tags)`.
  - No hardcoded secrets, account IDs, or regions.
  - Public-access flags default to most-restrictive; encryption at rest enabled for storage/DB resources.
  - Outputs with `description`; credential outputs `sensitive = true`. No backend or `provider {}` block in the module.

VALIDATE_BLOCK: |
  ```bash
  tofu -chdir=<module_dir> fmt -check
  tofu -chdir=<module_dir> init -backend=false
  tofu -chdir=<module_dir> validate
  ```

  (Use `terraform` if `tofu` is unavailable.)
