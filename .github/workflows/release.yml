name: Release to PyPI + GitHub

# Every merge to main triggers a full release. The workflow:
#
# 1. Resolves the release version: the pyproject.toml `version` when it is newer
#    than the latest git tag (this is how minor/major bumps are cut — bump
#    pyproject and merge), otherwise the latest tag's patch component + 1.
# 2. Skips if a GitHub release already exists for that version.
# 3. Stamps the version into pyproject.toml.
# 4. Builds the wheel + sdist with `uv build`.
# 5. Runs `twine check --strict` against the built artifacts.
# 6. Publishes to PyPI via trusted publishing (PEP 740 / OIDC) — no API
#    tokens required, see https://docs.pypi.org/trusted-publishers/.
# 7. Creates a GitHub Release with the wheel + sdist attached. The tag
#    is created server-side by `gh release create` against the merge
#    commit on main.
# 8. Commits the version bump back to main with `[skip ci]` so the next
#    push (which would otherwise see the same latest_tag) picks up from
#    the bumped pyproject.toml.
#
# `[skip ci]` is honoured natively by GitHub Actions — the version-bump
# commit does not re-trigger this workflow.
#
# If any step fails, subsequent steps are skipped — including the version
# bump — so the next CI run will retry from the same version number.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight release if a newer commit arrives on main. Only one
# release runs at a time per ref to avoid version-bump collisions.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish, and tag
    runs-on: ubuntu-latest
    # PyPI Trusted Publisher requires the workflow to run under an
    # environment matching the configuration at pypi.org/manage/project.
    environment:
      name: pypi
      url: https://pypi.org/project/infrakit-cli/
    permissions:
      contents: write         # create tags, commit version bump
      pull-requests: write    # for completeness if hooks need it
      id-token: write         # trusted publishing OIDC token
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve next version
        id: get_tag
        run: |
          chmod +x .github/workflows/scripts/get-next-version.sh
          .github/workflows/scripts/get-next-version.sh

      - name: Skip if release already exists
        id: check_release
        run: |
          chmod +x .github/workflows/scripts/check-release-exists.sh
          .github/workflows/scripts/check-release-exists.sh ${{ steps.get_tag.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        if: steps.check_release.outputs.exists == 'false'
        uses: astral-sh/setup-uv@v3

      - name: Stamp version into pyproject.toml
        if: steps.check_release.outputs.exists == 'false'
        run: |
          chmod +x .github/workflows/scripts/update-version.sh
          .github/workflows/scripts/update-version.sh ${{ steps.get_tag.outputs.new_version }}

      - name: Build wheel and sdist
        if: steps.check_release.outputs.exists == 'false'
        run: |
          uv build
          ls -la dist/

      - name: Validate PyPI metadata and README rendering
        if: steps.check_release.outputs.exists == 'false'
        run: |
          uvx twine check --strict dist/*.whl dist/*.tar.gz

      - name: Generate release notes
        if: steps.check_release.outputs.exists == 'false'
        id: release_notes
        run: |
          chmod +x .github/workflows/scripts/generate-release-notes.sh
          .github/workflows/scripts/generate-release-notes.sh \
            ${{ steps.get_tag.outputs.new_version }} \
            ${{ steps.get_tag.outputs.latest_tag }}

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        if: steps.check_release.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          repository-url: https://upload.pypi.org/legacy/
          # Set TWINE_PASSWORD via the OIDC token; no API key needed.
          # See https://docs.pypi.org/trusted-publishers/ for setup.

      - name: Create GitHub Release (also creates the tag against main)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.get_tag.outputs.new_version }}" \
            dist/*.whl dist/*.tar.gz \
            --target main \
            --title "InfraKit CLI ${{ steps.get_tag.outputs.new_version }}" \
            --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump back to main
        if: steps.check_release.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.get_tag.outputs.new_version }} [skip ci]"
          git push
