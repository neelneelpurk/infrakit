name: Release to PyPI + GitHub

# pyproject.toml is the source of truth for the version. Every push to main
# runs this workflow; it releases whatever version pyproject.toml declares, but
# only if no GitHub Release exists for that version yet. So a merge that bumps
# the version cuts a release; a merge that leaves it untouched is a no-op. To
# ship any version — patch, minor, or major — bump `version` in pyproject.toml
# in your PR and merge it.
#
# Each run does, in order:
#
# 1. Reads the version from pyproject.toml (-> new_version, e.g. v1.0.0).
# 2. Skips every remaining step if a GitHub Release already exists for that
#    version. This is the idempotency guard: no-bump merges do nothing, and a
#    failed run can be safely re-run from the same version number.
# 3. Builds the wheel + sdist with `uv build`.
# 4. Runs `twine check --strict` against the built artifacts.
# 5. Generates release notes from the commits since the latest tag.
# 6. Publishes to PyPI via trusted publishing (PEP 740 / OIDC) — no API
#    tokens required, see https://docs.pypi.org/trusted-publishers/.
# 7. Creates a GitHub Release with the wheel + sdist attached. The tag is
#    created server-side by `gh release create` against the commit on main.
#
# CI never edits pyproject.toml — the released version is exactly what the
# merging PR set. If any step fails, subsequent steps are skipped, so the next
# run retries the same version. PyPI publish + GitHub Release + tag therefore
# ship atomically: either all three or none.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight release if a newer commit arrives on main. Only one
# release runs at a time per ref to avoid collisions.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish, and tag
    runs-on: ubuntu-latest
    # PyPI Trusted Publisher requires the workflow to run under an
    # environment matching the configuration at pypi.org/manage/project.
    environment:
      name: pypi
      url: https://pypi.org/project/infrakit-cli/
    permissions:
      contents: write         # create the release tag
      pull-requests: write    # for completeness if hooks need it
      id-token: write         # trusted publishing OIDC token
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version (from pyproject.toml)
        id: get_tag
        run: |
          chmod +x .github/workflows/scripts/get-next-version.sh
          .github/workflows/scripts/get-next-version.sh

      - name: Skip if release already exists
        id: check_release
        run: |
          chmod +x .github/workflows/scripts/check-release-exists.sh
          .github/workflows/scripts/check-release-exists.sh ${{ steps.get_tag.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        if: steps.check_release.outputs.exists == 'false'
        uses: astral-sh/setup-uv@v3

      - name: Build wheel and sdist
        if: steps.check_release.outputs.exists == 'false'
        run: |
          uv build
          ls -la dist/

      - name: Validate PyPI metadata and README rendering
        if: steps.check_release.outputs.exists == 'false'
        run: |
          uvx twine check --strict dist/*.whl dist/*.tar.gz

      - name: Generate release notes
        if: steps.check_release.outputs.exists == 'false'
        id: release_notes
        run: |
          chmod +x .github/workflows/scripts/generate-release-notes.sh
          .github/workflows/scripts/generate-release-notes.sh \
            ${{ steps.get_tag.outputs.new_version }} \
            ${{ steps.get_tag.outputs.latest_tag }}

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        if: steps.check_release.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          repository-url: https://upload.pypi.org/legacy/
          # Set TWINE_PASSWORD via the OIDC token; no API key needed.
          # See https://docs.pypi.org/trusted-publishers/ for setup.

      - name: Create GitHub Release (also creates the tag against main)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.get_tag.outputs.new_version }}" \
            dist/*.whl dist/*.tar.gz \
            --target main \
            --title "InfraKit CLI ${{ steps.get_tag.outputs.new_version }}" \
            --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
